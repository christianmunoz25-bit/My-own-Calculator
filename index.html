<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Colorful Calculator</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>

<div id="calculator">
  <input type="text" id="display" disabled />

  <div class="row">
    <button class="clear" onclick="clearDisplay()">C</button>
    <button class="operator plus" onclick="setOperation('+')">+</button>
    <button class="operator minus" onclick="setOperation('-')">-</button>
    <button class="operator multiply" onclick="setOperation('*')">*</button>
  </div>

  <div class="row">
    <button onclick="appendNumber('7')">7</button>
    <button onclick="appendNumber('8')">8</button>
    <button onclick="appendNumber('9')">9</button>
    <button class="operator divide" onclick="setOperation('/')">/</button>
  </div>

  <div class="row">
    <button onclick="appendNumber('4')">4</button>
    <button onclick="appendNumber('5')">5</button>
    <button onclick="appendNumber('6')">6</button>
    <button class="equals" onclick="calculate()">=</button>
  </div>

  <div class="row">
    <button onclick="appendNumber('1')">1</button>
    <button onclick="appendNumber('2')">2</button>
    <button onclick="appendNumber('3')">3</button>
    <button class="dot" onclick="appendNumber('.')">.</button>
  </div>

  <div class="row">
    <button class="zero" onclick="appendNumber('0')">0</button>
  </div>
</div>

<script src="App.js"></script>
</body>
</html>
